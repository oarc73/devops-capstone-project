apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nosetests
spec:
  params:
    - name: DATABASE_URI
      type: string
  workspaces:
    - name: source
  steps:
    - name: test
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        pip install -r requirements.txt
        export DATABASE_URI=$(params.DATABASE_URI)
        nosetests
        